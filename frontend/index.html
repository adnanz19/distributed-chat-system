<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Terdistribusi - Kelompok 1</title>
    <link rel="icon" href="https://fav.farm/💬" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container" id="mainContainer">
      <div id="authPanel">
        <div class="header" style="margin-bottom: 24px; text-align: center">
          <h2>Auth & Chat System</h2>
        </div>
        <h3>Masuk ke Akun</h3>
        <input
          id="username"
          type="text"
          placeholder="Username"
          autocomplete="off"
        />
        <input id="password" type="password" placeholder="Password" />

        <div class="btn-group">
          <button class="btn-outline" onclick="handleAuth('/api/register')">
            Daftar
          </button>
          <button onclick="handleAuth('/api/login')">Login</button>
        </div>
        <p id="authMessage"></p>
      </div>

      <div id="chatPanel" style="display: none" class="bento-layout">
        <div class="bento-card bento-profile">
          <div class="profile-avatar">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <div>
            <span style="font-size: 0.85rem; color: #6b7280"
              >Masuk sebagai</span
            >
            <h3
              id="userGreeting"
              style="margin: 4px 0 0 0; color: #111827"
            ></h3>
          </div>
        </div>

        <div class="bento-card bento-clock">
          <span class="clock-label">Waktu Saat Ini</span>
          <span class="clock-time" id="liveClock">--:--:--</span>
          <span class="clock-date" id="liveDate">-</span>
        </div>

        <div class="bento-card bento-logout" onclick="showLogoutConfirm()" title="Keluar">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span style="font-weight: 600">Keluar</span>
        </div>

        <div class="bento-card bento-chat" style="padding: 0; overflow: hidden">
          <div
            class="chat-header"
            style="
              padding: 20px;
              border-bottom: 1px solid #e5e7eb;
              display: flex;
              justify-content: space-between;
              align-items: center;
              background: #fff;
            "
          >
            <h3 style="margin: 0">Obrolan Global</h3>
            <div class="user-count-badge">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
              <span id="onlineCount">Memuat...</span>
            </div>
          </div>

          <ul
            id="messages"
            style="
              flex: 1;
              padding: 20px;
              margin: 0;
              overflow-y: auto;
              background: #f9fafb;
            "
          ></ul>

          <div 
            class="chat-input-area" 
            style="
              padding: 20px; 
              background: #fff; 
              border-top: 1px solid #e5e7eb; 
              display: flex; 
              gap: 10px;">
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="uploadImage()">
            <button type="button" onclick="document.getElementById('imageInput').click()" style="background: #e5e7eb; color: #374151; padding: 0 15px; border: none; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center;" title="Unggah Gambar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
            </button>

            <input
              id="chatInput"
              type="text"
              placeholder="Ketik pesan di sini..."
              autocomplete="off"
              onkeypress="handleEnter(event)"
              style="flex: 1;"
            />
            <button onclick="sendMessage()">Kirim</button>
          </div>

        </div>
      </div>
    </div>

    <div id="logoutModal" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </div>
        <h3>Keluar dari akun?</h3>
        <p>Kamu perlu login lagi untuk melanjutkan obrolan.</p>
        <div class="modal-actions">
          <button class="modal-btn-cancel" onclick="hideLogoutConfirm()">Batal</button>
          <button class="modal-btn-confirm" onclick="confirmLogout()">Ya, Keluar</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="script.js?v=4"></script>

    <script>
      // Override fungsi default agar saat panel chat muncul, container utama melebarkan diri
      const originalDisplay =
        document.getElementById("chatPanel").style.display;
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          if (
            mutation.target.style.display === "block" ||
            mutation.target.style.display === ""
          ) {
            mutation.target.classList.add("bento-active");
            document
              .getElementById("mainContainer")
              .classList.add("container-chat-mode");
          }
        });
      });
      observer.observe(document.getElementById("chatPanel"), {
        attributes: true,
        attributeFilter: ["style"],
      });
    </script>
    
    <div id="imageModal" onclick="closeImageModal()" style="display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.85);">
        <span id="downloadImgBtn" onclick="forceDownload(event)" style="position: absolute; top: 32px; right: 90px; color: #f1f1f1; cursor: pointer; z-index: 10000; transition: 0.2s;" title="Unduh Gambar">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
        </span>
        <span style="position: absolute; top: 20px; right: 40px; color: #f1f1f1; font-size: 45px; font-weight: bold; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.5); z-index: 10000; line-height: 1;">&times;</span>
        <img id="expandedImg" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); max-width: 90vw !important; max-height: 90vh !important; object-fit: contain !important; width: auto; height: auto; border-radius: 8px; box-shadow: 0 4px 25px rgba(0,0,0,0.8);">
    </div>
    
  </body>
</html>
