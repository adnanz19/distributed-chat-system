<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Terdistribusi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Auth & Chat System</h2>
        </div>

        <div id="authPanel">
            <h3>Masuk ke Akun</h3>
            <input id="username" type="text" placeholder="Username" autocomplete="off" />
            <input id="password" type="password" placeholder="Password" />
            
            <div class="btn-group">
                <button class="btn-outline" onclick="handleAuth('/api/register')">Daftar</button>
                <button onclick="handleAuth('/api/login')">Login</button>
            </div>
            <p id="authMessage"></p>
        </div>

        <div id="chatPanel" style="display: none;">
            <div class="chat-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h3>Obrolan Global</h3>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <span id="userGreeting"></span>
                    <button onclick="logout()" title="Keluar" style="background: transparent; border: none; cursor: pointer; color: #ef4444; padding: 4px; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
            </div>
            
            <ul id="messages"></ul>
            
            <div class="chat-input-area">
                <input id="chatInput" type="text" placeholder="Ketik pesan di sini..." autocomplete="off" onkeypress="handleEnter(event)" />
                <button onclick="sendMessage()">Kirim</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
